name: New Collector (TXT)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tzdata # نصب tzdata برای حل مشکل منطقه زمانی تهران در لینوکس

      - name: Run SlipNet collector
        run: python scraper-1.py # حتما مطمئن شوید نام فایل اسکریپت شما دقیقا scraper.py باشد

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # اضافه کردن فایل خروجی با نام خاص
          git add '☬™.txt'
          
          # بررسی اینکه آیا تغییری اعمال شده است یا خیر
          if ! git diff --quiet --cached; then
            git commit -m "Next refresh less than 10min [skip ci]"
            
            # همگام‌سازی با آخرین تغییرات ریپوزیتوری جهت جلوگیری از تداخل (Conflict) در زمان پوش کردن
            git pull --rebase origin main
            
            git push origin main
          else
            echo "No changes in nodes, skipping commit."
          fi
